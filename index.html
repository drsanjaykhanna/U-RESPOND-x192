<!DOCTYPE html>
<html lang="en"> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-RESPOND Participant Questionnaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for form elements */
        .form-radio {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border-radius: 50%;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #d1d5db;
            transition: 0.2s all linear;
            margin-right: 0.5rem;
            position: relative;
            top: 0.2rem;
        }
        .form-radio:checked {
            border: 6px solid #2563eb;
        }
        .form-checkbox {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border-radius: 0.25rem;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #d1d5db;
            transition: 0.2s all linear;
            margin-right: 0.5rem;
            position: relative;
            top: 0.2rem;
        }
        .form-checkbox:checked {
            background-color: #2563eb;
            border-color: #2563eb;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
        .scale-radio:checked {
            border-color: #2563eb;
            background-color: #2563eb;
        }
        .progress-bar-fill {
            transition: width 0.3s ease-in-out;
        }
        /* Slider custom styles */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #d1d5db;
            border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            margin-top: -8px;
        }
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #d1d5db;
            border-radius: 5px;
        }
        input[type=range]::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
        }
        .dce-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .dce-table th, .dce-table td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: center;
        }
        .dce-table th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        .dce-table td.feature-label {
            text-align: left;
            font-weight: 500;
            background-color: #f9fafb;
        }
        .dce-choice-label {
            display: block;
            margin-top: 1rem;
            padding: 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dce-choice-label:hover {
            background-color: #f9fafb;
        }
        input[type="radio"]:checked + .dce-choice-label {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto max-w-3xl p-4 sm:p-8">
        <div class="bg-white p-6 sm:p-10 rounded-2xl shadow-lg relative">
            
            <button id="dev-toggle" class="absolute top-4 right-4 w-3 h-3 rounded-full bg-gray-100 transition-colors duration-200 focus:outline-none z-50 cursor-pointer" title=""></button>

            <div class="flex justify-center items-center py-4 border-b mb-6">
                <svg class="h-16 sm:h-20" viewBox="0 0 250 60" xmlns="http://www.w3.org/2000/svg">
                    <style>
                      .title { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 800; fill: #1e3a8a; }
                      .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; fill: #3b82f6; letter-spacing: 0.1em; }
                    </style>
                    <g>
                      <circle cx="30" cy="30" r="20" stroke="#3b82f6" stroke-width="4" fill="none"/>
                      <circle cx="30" cy="30" r="12" stroke="#3b82f6" stroke-width="4" fill="none"/>
                      <circle cx="30" cy="30" r="4" fill="#3b82f6"/>
                      <text x="70" y="30" class="title">U-RESPOND</text>
                      <text x="70" y="48" class="subtitle">STUDY</text>
                    </g>
                </svg>
            </div>

            <div class="text-center pb-4 mb-6">
                <p class="text-xl text-gray-800 font-bold">Participant Questionnaire</p>
            </div>

            <div id="progress-container" class="mb-8">
                <div class="flex justify-between mb-1">
                    <span id="progress-text" class="text-base font-medium text-blue-700"></span>
                    <span id="progress-percentage" class="text-sm font-medium text-blue-700"></span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>

            <div id="questionnaire-container">
                </div>

            <div id="navigation-container" class="mt-8 flex justify-between items-center">
                <button id="back-btn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out">Back</button>
                <button id="next-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out">Next</button>
                <button id="submit-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300 ease-in-out hidden">Submit</button>
            </div>
            
            <div id="message-box" class="hidden mt-6 p-4 rounded-lg">
                <p id="message-text"></p>
            </div>

        </div>
        <footer class="text-center mt-6 text-sm text-gray-500">
            <p>Your responses are confidential and will be used for research purposes only.</p>
            <p>A study by The Royal Marsden NHS Foundation Trust & The Institute of Cancer Research</p>
        </footer>

        <footer class="w-full max-w-3xl mt-8 text-center mx-auto">
            <div class="bg-white p-6 rounded-2xl shadow-lg">
                <p class="text-sm font-semibold text-gray-600 mb-4">In collaboration with:</p>
                <div class="flex flex-col items-center space-y-6">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/National_Health_Service_%28England%29_logo.svg/1280px-National_Health_Service_%28England%29_logo.svg.png" alt="NHS Logo" class="h-10 object-contain">
                    <img src="https://patientinfolibrary.royalmarsden.nhs.uk/themes/custom/rmt/logo.svg" alt="Royal Marsden Logo" class="h-12 object-contain">
                </div>
            </div>
        </footer>
        </div>

    <script>
        // --- QUESTIONNAIRE DATA ---
        const questionnaireData = [
            {
                domain: "Welcome & Consent",
                questions: [
                    {
                        id: "welcome",
                        text: "Welcome to the U-RESPOND study questionnaire. Thank you for taking part in this important research.<br><br>This questionnaire asks about your views and experiences related to lung cancer screening. It should take about <strong>20 minutes</strong> to complete. There are no right or wrong answers — we are interested in your honest opinions.",
                        type: "info"
                    },
                    {
                        id: "participant_id",
                        text: "Please enter your Unique Participant ID Number",
                        type: "text",
                        placeholder: "e.g., URS-12345"
                    },
                    {
                        id: "consent_confirm",
                        text: "I confirm that I have read the Participant Information Sheet and I freely agree to take part in this study. I understand that my answers will be kept strictly confidential and used for research purposes only.",
                        type: "checkbox"
                    }
                ]
            },
            {
                domain: "About You",
                questions: [
                    {
                        id: "demographics_explainer",
                        text: "The following questions help us check that we are hearing from people of all backgrounds. All your answers are kept strictly confidential.",
                        type: "info"
                    },
                    { id: "age", text: "What is your age (in years)?", type: "number", placeholder: "e.g., 65" },
                    { id: "sex", text: "What was your sex assigned at birth?", type: "categorical", options: ["Male", "Female"] },
                    { id: "ethnic_group", text: "What is your ethnic group?", type: "categorical", options: ["White", "Mixed/Multiple ethnic groups", "Asian/Asian British", "Black/African/Caribbean/Black British", "Other ethnic group", "Prefer not to say"] },
                    { id: "ethnic_group_other", text: "Please specify your ethnic group", type: "text", placeholder: "Please specify", condition: { id: "ethnic_group", value: "Other ethnic group" }, optional: true },
                    { id: "education_level", text: "What is the highest level of education you have completed?", type: "categorical", options: ["No formal qualifications", "GCSEs/O-Levels or equivalent", "A-Levels or equivalent", "Undergraduate degree", "Postgraduate degree", "Prefer not to say"] },
                    { id: "employment_status", text: "Which of the following best describes your current work situation?", type: "categorical", options: ["Employed", "Self-employed", "Unemployed", "Retired", "Student", "Other"] },
                    { id: "employment_details", text: "Please tell us more about your employment (select all that apply):", type: "multi_checkbox", options: ["I work full-time", "I work part-time", "I have more than one job", "I am on a zero-hours contract"], condition: { id: "employment_status", value: "Employed" }, optional: true },
                    { id: "postcode", text: "What is the first part of your postcode?", type: "text", placeholder: "e.g., SW3" },
                    { id: "primary_language", text: "What is the main language spoken in your home?", type: "text", placeholder: "e.g., English" },
                    { id: "general_health", text: "In general, how would you rate your overall health?", type: "scale", options: ["Very good", "Good", "Fair", "Poor", "Very poor"] },
                ]
            },
            {
                domain: "Your Health Background",
                questions: [
                    // --- Smoking History ---
                    { id: "smoked_ever", text: "Have you ever smoked tobacco?", type: "Y/N" },
                    { id: "smoke_currently", text: "Do you currently smoke?", type: "Y/N", condition: { id: "smoked_ever", value: "Yes" } },
                    
                    // Questions for FORMER smokers
                    { id: "years_smoked_ex", text: "How many years did you smoke for?", type: "number", placeholder: "e.g., 20", condition: { logic: 'AND', rules: [{id: 'smoked_ever', value: 'Yes'}, {id: 'smoke_currently', value: 'No'}] } },
                    { id: "cigs_per_day_ex", text: "On average, how many cigarettes (or equivalent) did you smoke per day?", type: "text", placeholder: "e.g., 15 cigarettes", condition: { logic: 'AND', rules: [{id: 'smoked_ever', value: 'Yes'}, {id: 'smoke_currently', value: 'No'}] } },
                    { id: "years_quit", text: "How many years ago did you stop smoking regularly?", type: "number", placeholder: "e.g., 10", condition: { logic: 'AND', rules: [{id: 'smoked_ever', value: 'Yes'}, {id: 'smoke_currently', value: 'No'}] } },

                    // Questions for CURRENT smokers
                    { id: "years_smoked_current", text: "How many years have you smoked for?", type: "number", placeholder: "e.g., 30", condition: { logic: 'AND', rules: [{id: 'smoked_ever', value: 'Yes'}, {id: 'smoke_currently', value: 'Yes'}] } },
                    { id: "cigs_per_day_current", text: "On average, how many cigarettes (or equivalent) do you smoke per day?", type: "text", placeholder: "e.g., 20 cigarettes", condition: { logic: 'AND', rules: [{id: 'smoked_ever', value: 'Yes'}, {id: 'smoke_currently', value: 'Yes'}] } },

                    // --- Screening & Cancer History ---
                    { id: "other_screening", text: "Have you ever taken part in any other type of cancer screening (for example, breast, bowel, or cervical)?", type: "Y/N" },
                    { id: "lung_invite", text: "Have you ever received an invitation for an NHS Lung Health Check?", type: "Y/N/Unsure" },
                    { id: "lung_attended_completed", text: "Did you attend and complete the Lung Health Check?", type: "Y/N", condition: { id: "lung_invite", value: "Yes" } },
                    { id: "lung_check_date", text: "Approximately when did you have the lung health check?", type: "text", placeholder: "e.g., 2023, or last year", condition: { id: "lung_attended_completed", value: "Yes" } },
                    
                    { id: "diagnosed_lc", text: "Have you ever been diagnosed with lung cancer?", type: "Y/N" },
                    { id: "diagnosed_lc_year", text: "Approximately which year were you diagnosed?", type: "text", placeholder: "e.g., 2022", condition: { id: "diagnosed_lc", value: "Yes" } },

                    { id: "family_diagnosed_lc", text: "Has a close family member (for example, a parent, brother, or sister) ever been diagnosed with lung cancer?", type: "Y/N" },
                    { id: "family_diagnosed_lc_year", text: "Approximately which year were they diagnosed?", type: "text", placeholder: "e.g., 2020", condition: { id: "family_diagnosed_lc", value: "Yes" } },
                    
                    { id: "investigations_negative", text: "Have you ever had tests or scans for a possible lung cancer that turned out to show no cancer?", type: "Y/N" },
                    { id: "investigations_negative_date", text: "Approximately when did this happen?", type: "text", placeholder: "e.g., last year", condition: { id: "investigations_negative", value: "Yes" } },
                ]
            },
            {
                domain: "What You Know About Lung Screening",
                questions: [
                    { id: "awareness_lcs", text: "How aware are you of the NHS national lung cancer screening programme?", type: "scale", options: ["Not at all aware", "Slightly aware", "Moderately aware", "Very aware", "Extremely aware"] },
                    { id: "lcs_sources", text: "Where have you heard about lung cancer screening? (Please select all that apply)", type: "multi_checkbox", options: ["GP or nurse", "NHS letter or leaflet", "TV or radio", "Newspaper or magazine", "Online (e.g., websites, social media)", "Family or friends", "Other"], optional: true },
                    { id: "lcs_purpose", text: "What do you think is the main purpose of a lung health check?", type: "categorical", options: ["To find lung cancer early", "To prevent lung cancer", "To check for other lung problems", "I'm not sure"] },
                    { id: "lcs_scantype", text: "What type of test is usually used for lung cancer screening?", type: "categorical", options: ["A CT scan", "An X-ray", "An MRI scan", "A blood test", "I'm not sure"] },
                    { id: "lcs_importance", text: "How important do you think it is to screen for lung cancer?", type: "slider", min: 0, max: 100, minLabel: "Not important at all", maxLabel: "Extremely important" },
                    { id: "knowledge_statement_1", text: "Lung cancer screening can detect cancer at an early stage, when it is easier to treat.", type: "T/F/DK" },
                    { id: "knowledge_statement_2", text: "Lung cancer screening reduces the risk of dying from lung cancer.", type: "T/F/DK" },
                    { id: "knowledge_statement_3", text: "Lung cancer screening is only recommended for people who currently smoke.", type: "T/F/DK" },
                    { id: "knowledge_statement_4", text: "Lung cancer screening will always detect cancer if it is present.", type: "T/F/DK" },
                    { id: "knowledge_statement_5", text: "Lung cancer screening often leads to further tests or procedures.", type: "T/F/DK" }
                ]
            },
            {
                domain: "Possible Upsides of Screening",
                questions: [
                    {
                        id: "benefit_for_whom",
                        text: "In your opinion, who would benefit most from having a lung health check?",
                        type: "textarea",
                        placeholder: "e.g., people with a long smoking history, people with worries..."
                    },
                    { id: "benefit_main", text: "In your own words, what do you think is the main benefit of lung cancer screening?", type: "textarea", placeholder: "Type your answer here..." },
                    { id: "motivation_intro", text: "Please rate how much you agree or disagree with each of the following statements.", type: "info" },
                    { id: "motivation_detect_early", text: "The fact that screening can find cancer early, when it is easier to treat, would be a strong reason for me to take part.", type: "agreement_scale" },
                    { id: "motivation_increase_survival", text: "I would take part in screening to improve my chances of survival if I developed lung cancer.", type: "agreement_scale" },
                    { id: "motivation_peace_of_mind", text: "Having a lung cancer screening test would give me peace of mind about my health.", type: "agreement_scale" },
                    { id: "motivation_responsibility", text: "I believe that people at risk of lung cancer have a duty to get screened.", type: "agreement_scale" },
                    { id: "motivation_doctor_rec", text: "A strong recommendation from my doctor would be one of the main reasons for me to get screened.", type: "agreement_scale" },
                    { id: "motivation_family_worry", text: "I would take part in screening to ease my family's worry about my health.", type: "agreement_scale" },
                    { id: "motivation_ranking", text: "Which of the following is the MOST important reason for you to consider screening?", type: "categorical", options: ["Detecting cancer early", "Increasing my chances of survival", "Giving me peace of mind", "It is my responsibility", "My doctor's recommendation", "Reducing my family's worry"] }
                ]
            },
            {
                domain: "Your Views on Lung Screening",
                questions: [
                    { id: "perceived_risk_population", text: "Out of every 100 people in the general population, how many do you think will develop lung cancer in their lifetime?", type: "slider", min: 0, max: 100, minLabel: "0", maxLabel: "100" },
                    { id: "perceived_risk_personal", text: "How would you rate your own personal chance of developing lung cancer in your lifetime?", type: "slider", min: 0, max: 100, minLabel: "No chance", maxLabel: "Certain" },
                    { id: "seriousness_diagnosis", text: "How serious do you think a diagnosis of lung cancer would be?", type: "scale", options: ["Not at all serious", "Slightly serious", "Moderately serious", "Very serious", "Extremely serious"] },
                    { id: "barrier_main_reason", text: "In your own words, what do you think is the main reason someone might choose not to have lung cancer screening?", type: "textarea", placeholder: "Type your answer here..." },
                    { id: "barrier_intro", text: "Please rate how much each of the following would put you off having a lung cancer screening test:", type: "info" },
                    { id: "concern_radiation", text: "I would be worried about the radiation from a CT scan.", type: "agreement_scale" },
                    { id: "concern_false_positive", text: "I would be anxious about receiving a 'false alarm' (a result that suggests a problem when there isn't one).", type: "agreement_scale" },
                    { id: "concern_finding_cancer", text: "The thought of finding out I might have cancer would make me anxious.", type: "agreement_scale" },
                    { id: "concern_inconvenience", text: "The screening process seems inconvenient (for example, travelling to the appointment or taking time off work).", type: "agreement_scale" },
                    { id: "concern_stigma", text: "I feel there is a stigma around smoking that would make me reluctant to go for screening.", type: "agreement_scale" },
                    { id: "concern_follow_up", text: "I would be worried about what further tests might be needed if something unusual were found.", type: "agreement_scale" },
                    { id: "concern_no_difference", text: "I do not believe that screening would make a difference for me personally.", type: "agreement_scale" },
                    { id: "concern_uncomfortable", text: "I would feel physically uncomfortable having a lung cancer screening scan.", type: "agreement_scale" },
                    { id: "concern_lack_of_info", text: "Not having enough information about lung cancer screening would put me off.", type: "agreement_scale" },
                    { id: "barrier_ranking", text: "Which of the following is the BIGGEST concern or reason that would make you less likely to have a lung cancer screen?", type: "categorical", options: ["Worry about radiation from the CT scan", "Anxiety about a false positive result", "Anxiety about finding out I have cancer", "Inconvenience (travel, time off work)", "Stigma associated with smoking", "Worry about follow-up procedures", "Belief that screening won't make a difference", "Discomfort with the scan itself", "Lack of information"] },
                    { id: "psych_hopeful", text: "If you were offered lung cancer screening, how hopeful would you feel about the possible benefits?", type: "scale", options: ["Not at all hopeful", "Slightly hopeful", "Moderately hopeful", "Very hopeful", "Extremely hopeful"] },
                    { id: "psych_guilt", text: "How much guilt, if any, do you feel about your smoking history when you think about lung cancer?", type: "scale", options: ["No guilt at all", "A little guilt", "A moderate amount of guilt", "A lot of guilt", "A great deal of guilt"], condition: { id: "smoked_ever", value: "Yes" } },
                    { id: "psych_feelings", text: "When you think about having lung cancer screening, which of these words describe how you feel? (Select all that apply)", type: "multi_checkbox", options: ["Anxious", "Hopeful", "Relieved", "Nervous", "Indifferent", "Empowered"], optional: true },
                    { id: "psych_personal_risk", text: "I feel that my personal risk of developing lung cancer is high.", type: "agreement_scale" },
                    { id: "psych_consequences", text: "The consequences of lung cancer (for example, treatment and side effects) would be very severe.", type: "agreement_scale" },
                    { id: "psych_confident_attend", text: "I feel confident that I could organise and attend a lung cancer screening appointment.", type: "agreement_scale" },
                    { id: "psych_social_norm", text: "Most people who are important to me (for example, family and close friends) would want me to be screened.", type: "agreement_scale" },
                    { id: "psych_useful", text: "I believe taking part in lung cancer screening would be useful for me.", type: "agreement_scale" },
                    { id: "psych_pleasant", text: "I believe having a lung cancer screening test would be a pleasant experience.", type: "agreement_scale" },
                    { id: "psych_control", text: "I have full control over whether or not I take part in lung cancer screening.", type: "agreement_scale" },
                    { id: "psych_fate", text: "My health is mostly determined by fate or luck, not by my own actions.", type: "agreement_scale" },
                    { id: "psych_good_at_planning", text: "I am generally good at planning and remembering my medical appointments.", type: "agreement_scale" },
                    { id: "psych_judged", text: "I would feel judged by others if I went for lung cancer screening because of my smoking history.", type: "agreement_scale" },
                    { id: "psych_blame", text: "Society tends to blame people who get lung cancer.", type: "agreement_scale" }
                ]
            },
            {
                domain: "Different Types of Screening Tests",
                questions: [
                    { id: "modality_intro_blood_test", text: "Researchers are developing new ways to screen for lung cancer. One of the most promising is a simple <strong>blood test</strong>. It works by looking for tiny signals in the blood that can be released by cancer cells at an early stage. These tests are still being improved and are not yet perfect.", type: "info" },
                    { id: "modality_consider_blood_test", text: "Would you consider having this type of blood test for lung cancer screening?", type: "Y/N" },
                    { id: "modality_blood_test_routine", text: "If the blood test were done at the same time as a blood sample you were already giving (for example, during a routine check-up), would this make you...", type: "scale", options: ["Much less likely to have it", "Less likely", "Equally likely", "More likely", "Much more likely to have it"] },
                    { id: "modality_blood_test_self_collect", text: "If you could do the blood test yourself at home using a simple finger-prick kit, would this make you...", type: "scale", options: ["Much less likely to have it", "Less likely", "Equally likely", "More likely", "Much more likely to have it"] },
                    { id: "modality_blood_test_multi_cancer", text: "If the blood test could also check for other types of cancer (not just lung cancer), would this make you...", type: "scale", options: ["Much less likely to have it", "Less likely", "Equally likely", "More likely", "Much more likely to have it"] },
                    
                    { id: "modality_blood_test_in_addition", text: "How likely would you be to have this blood test <strong>in addition to</strong> a CT scan?", type: "scale", options: ["Very unlikely", "Unlikely", "Neutral", "Likely", "Very likely"] },
                    { id: "modality_blood_test_instead", text: "How likely would you be to have this blood test <strong>instead of</strong> a CT scan?", type: "scale", options: ["Very unlikely", "Unlikely", "Neutral", "Likely", "Very likely"] },
                    { id: "modality_preference_ct_blood_same", text: "Overall, would you be more likely to have a CT scan, more likely to have the new blood test, or are you equally likely to have either?", type: "categorical", options: ["More likely to have a CT scan", "More likely to have a blood test", "Equally likely to have either"] },

                    { id: "modality_agreement_intro", text: "Thinking about this new blood test, please say how much you agree or disagree with each statement below:", type: "info" },
                    { id: "modality_agree_convenient", text: "A blood test for lung cancer screening would be more convenient than a CT scan.", type: "agreement_scale" },
                    { id: "modality_agree_less_anxious", text: "I would be less anxious about a blood test than a CT scan.", type: "agreement_scale" },

        function initializeQuestionnaire() {

                stepElement.className = 'step hidden';
                
                let stepTitleHTML = `<h2 class="text-2xl font-semibold text-gray-700 mb-4">${stepData.domain}</h2>`;

                stepElement.innerHTML = stepTitleHTML + questionsHTML;
                questionnaireContainer.appendChild(stepElement);

            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', () => evaluateConditions(currentStep));

                    });
                }
            });

             // Add listener for communication choice checkboxes to limit selection to 3
            ['comm_intro_poster', 'comm_intro_letter'].forEach(id => {
                 const question = findQuestionById(id);
                 if(!question) return;

                 const checkboxes = document.querySelectorAll(`input[name="${question.id}"]`);
                 checkboxes.forEach(checkbox => {
                     checkbox.addEventListener('change', () => {
                         const checkedCount = document.querySelectorAll(`input[name="${question.id}"]:checked`).length;
                         if (checkedCount > 3) {
                             checkbox.checked = false;
                         }
                     });
                 });
             });

            renderStep(0);
        }

        function evaluateConditions(stepIndex) {
            const stepData = questionnaireData[stepIndex];
            if (!stepData) return;
            
            saveResponses(); // Save current state before re-evaluating

            stepData.questions.forEach(question => {
                const wrapper = document.getElementById(`question-wrapper-${question.id}`);
                if (question.condition && wrapper) {
                    const conditionMet = checkCondition(question.condition);
                    wrapper.classList.toggle('hidden', !conditionMet);
                }
            });
             // Also re-evaluate conditions for the next steps to hide/show entire pages
            for (let i = stepIndex + 1; i < questionnaireData.length; i++) {
                const domain = questionnaireData[i];
                // Check if the first question of a domain has a condition
                if (domain.questions[0] && domain.questions[0].condition) {
                     const stepElement = document.getElementById(`step-${i}`);
                     if(stepElement) {
                        const conditionMet = checkCondition(domain.questions[0].condition);
                         // This is a simple implementation; we are not hiding from progress bar
                         // but this logic will apply when rendering the step itself.
                     }
                }
            }
            updateNavigation(); // Update nav buttons after conditions change
        }

        function checkCondition(condition) {
            if (condition.logic === 'AND') {
                return condition.rules.every(rule => getResponse(rule.id) === rule.value);
            } else if (condition.logic === 'OR') {
                return condition.rules.some(rule => getResponse(rule.id) === rule.value);
            } else {
                return getResponse(condition.id) === condition.value;
            }
        }

        function updateNavigation() {
            backBtn.classList.toggle('hidden', currentStep === 0);

            // Find next visible step
            let nextVisibleStep = -1;
            for (let i = currentStep + 1; i < questionnaireData.length; i++) {
                const firstQuestion = questionnaireData[i].questions[0];
                if (!firstQuestion.condition || checkCondition(firstQuestion.condition)) {
                    nextVisibleStep = i;
                    break;
                }
            }
            
            const isLastVisibleStep = nextVisibleStep === -1;
            nextBtn.classList.toggle('hidden', isLastVisibleStep);
            submitBtn.classList.toggle('hidden', !isLastVisibleStep);
        }

        function updateProgressBar() {
            if (currentStep > 0) {
                const percentage = Math.round(((currentStep-1) / (questionnaireData.length - 2)) * 100);
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `Step ${currentStep} of ${questionnaireData.length-1}: ${questionnaireData[currentStep].domain}`;
                progressPercentage.textContent = `${percentage}%`;
            }
        }

        function saveResponses() {
            const currentStepData = questionnaireData[currentStep];
            currentStepData.questions.forEach(q => {
                const wrapper = document.getElementById(`question-wrapper-${q.id}`);
                if (wrapper && !wrapper.classList.contains('hidden')) {
                    if (q.type === 'multi_checkbox' || q.type === 'communication_choice_poster' || q.type === 'communication_choice_letter') {
                        const allCheckboxes = document.querySelectorAll(`input[name="${q.id}"]`);
                        const checkedValues = Array.from(allCheckboxes)
                                                .filter(cb => cb.checked)
                                                .map(cb => cb.value);
                        responses[q.id] = checkedValues;
                    } else {
                        const input = document.querySelector(`[name="${q.id}"]`);
                        if (input) {
                            if (input.type === 'radio') {
                                const checked = document.querySelector(`[name="${q.id}"]:checked`);
                                responses[q.id] = checked ? checked.value : null;
                            } else if (input.type === 'checkbox') {
                                responses[q.id] = input.checked;
                            } else {
                                responses[q.id] = input.value;
                            }
                        }
                    }
                } else {
                    delete responses[q.id];
                }
            });
        }

        function getResponse(questionId) {
            return responses[questionId];
        }

        function validateStep() {
            hideMessage();
            saveResponses(); // Ensure the latest inputs are saved before checking

            // *** BYPASS VALIDATION IF SECRET TOGGLE IS ON ***
            if (devMode) return true;

            const currentStepData = questionnaireData[currentStep];
            let isValid = true;

            for (const q of currentStepData.questions) {
                const wrapper = document.getElementById(`question-wrapper-${q.id}`);
                
                // Only check questions that are currently visible on screen
                if (wrapper && !wrapper.classList.contains('hidden')) {
                    
                    // Skip 'info' blocks and explicitly optional questions
                    if (q.type === 'info' || q.optional === true) continue;

                    const response = responses[q.id];

                    // For arrays (checkboxes), check if it's empty
                    if (Array.isArray(response)) {
                        if (response.length === 0) {
                            isValid = false;
                            break;
                        }
                    } 
                    // For text, radios, scales, AND unchecked checkboxes (boolean false)
                    else if (response === undefined || response === null || response === '' || response === false) {
                        isValid = false;
                        break;
                    }
                }
            }

            if (!isValid) {
                showMessage('Please complete all required fields before continuing.', 'error');
                return false;
            }

            return true; 
        }
        
        function showMessage(text, type = 'info') {
            messageText.textContent = text;
            messageBox.className = `mt-6 p-4 rounded-lg ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            messageBox.classList.remove('hidden');
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        function findQuestionById(id) {
            for (const step of questionnaireData) {
                const found = step.questions.find(q => q.id === id);
                if (found) return found;
            }
            return null;
        }

        nextBtn.addEventListener('click', () => {
            if (validateStep()) {
                saveResponses();
                
                let nextStep = currentStep + 1;
                // Skip optional sections if condition not met
                while(nextStep < questionnaireData.length) {
                    const firstQuestion = questionnaireData[nextStep].questions[0];
                    if (!firstQuestion.condition || checkCondition(firstQuestion.condition)) {
                        break; // This is the next valid step
                    }
                    nextStep++;
                }

                if (nextStep < questionnaireData.length) {
                    currentStep = nextStep;
                    renderStep(currentStep);
                }
            }
        });

        backBtn.addEventListener('click', () => {
            saveResponses();

            let prevStep = currentStep - 1;
             while(prevStep > 0) {
                const firstQuestion = questionnaireData[prevStep].questions[0];
                if (!firstQuestion.condition || checkCondition(firstQuestion.condition)) {
                    break; // This is the previous valid step
                }
                prevStep--;
            }

            if (prevStep >= 0) {
                currentStep = prevStep;
                renderStep(currentStep);
            }
        });

    submitBtn.addEventListener('click', () => {
    if (validateStep()) {
        saveResponses();
        
        // *** CRITICAL: PASTE YOUR GOOGLE URL HERE ***
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxpAYb_wxG6c8BJjR9JO5xScLLPAQyA4vAnlfmhJzt1yZR_9Ck5xhzwhSkhlgUaUqbN/exec';

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        // Convert the responses object into the format Google expects
        const formData = new URLSearchParams();
        for (const key in responses) {
            const value = Array.isArray(responses[key]) ? responses[key].join(', ') : responses[key];
            // Skip null/undefined/empty values — don't send unfilled fields
            if (value === null || value === undefined || value === 'null' || value === '') continue;
            formData.append(key, value);
        }

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // This bypasses the 405 error from GitHub
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
        .then(() => {
            // Success UI
            questionnaireContainer.innerHTML = `
                <div class="text-center py-20">
                    <h2 class="text-3xl font-bold text-blue-900">Thank You!</h2>
                    <p class="mt-4 text-gray-600">Your responses have been recorded successfully.</p>
                </div>`;
            document.getElementById('navigation-container').classList.add('hidden');
            document.getElementById('progress-container').style.display = 'none';
        })
        .catch(error => {
            alert('Submission error. Please check your internet connection.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
        });
    }
});
        // Initial setup
        initializeQuestionnaire();
    </script>
</body>
</html>
